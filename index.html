<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>Smart Attendance Dashboard 📊</h1>
        <div class="input-section">
            <input type="text" id="subjectName" placeholder="Subject Name">
            <input type="number" id="totalClass" placeholder="Total Classes">
            <input type="number" id="attendedClass" placeholder="Attended">
            <button id="addBtn">Add Subject</button>
        </div>
        
        <div id="alertBox"></div>
        <div class="stats-grid" id="statsGrid"></div>
        
        <div class="charts">
            <canvas id="pieChart"></canvas>
            <canvas id="barChart"></canvas>
        </div>
        <button id="exportBtn">Export JSON</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
